<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SecureAuthSystem</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <h1>SecureAuthSystem</h1>

            <p class="subtitle">
                Enterprise Secure Authentication Platform
            </p>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login Securely
                </button>

            </form>

            <p id="message"></p>

            <a href="register.html">
                Create Account
            </a>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
