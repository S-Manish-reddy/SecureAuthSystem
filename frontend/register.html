<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <h1>Create Secure Account</h1>

            <p class="subtitle">
                Advanced Secure Authentication Platform
            </p>

            <form id="registerForm">

                <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required
                >

                <button type="submit">
                    Create Secure Account
                </button>

            </form>

            <p id="message"></p>

            <a href="index.html">
                Back To Login
            </a>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
