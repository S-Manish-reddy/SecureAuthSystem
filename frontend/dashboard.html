<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Secure Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="dashboard-container">

        <div class="dashboard-card">

            <h1>
                Secure Authentication Dashboard
            </h1>

            <p class="subtitle">
                Enterprise Authentication Security Platform
            </p>

            <div id="userInfo"></div>

            <div class="dashboard-actions">

                <button onclick="goTo2FA()">
                    Enable 2FA
                </button>

                <button onclick="logout()">
                    Logout
                </button>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
